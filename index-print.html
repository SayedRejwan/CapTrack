<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CapTrack — Capstone Evaluation Report (PDF)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: white;
      color: #172b4d;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Print setup — render the in-app evaluation report only */
    @page { size: A4 portrait; margin: 12mm; }

    @media print {
      html, body { background: white !important; }
      /* Hide everything except the printable report */
      body * { visibility: hidden; }
      .report-doc, .report-doc * { visibility: visible; }
      .report-doc {
        position: absolute !important;
        left: 0; top: 0; width: 100%;
        box-shadow: none !important;
        border: none !important;
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      /* Force background colors / accents to print */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      /* Avoid splitting per-team blocks across pages */
      .report-doc h2,
      .report-doc table { break-inside: avoid; }
      .report-doc tr, .report-doc div { break-inside: avoid; }
    }

    /* Screen preview — soften background so the report reads like a doc */
    @media screen {
      body { background: #ECEEF2; padding: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data -->
  <script src="data.js"></script>

  <!-- Components -->
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="team-board.jsx"></script>
  <script type="text/babel" src="supervisor.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Print shell — render only the supervisor's evaluation report -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    function PrintApp() {
      // The supervisor dashboard exposes ReportView internally; we render the
      // whole dashboard but immediately hide chrome via CSS for screen, and let
      // @media print isolate just the .report-doc block.
      useEffect(() => {
        // Wait for fonts + Babel-transformed scripts before printing
        const ready = (document.fonts && document.fonts.ready) || Promise.resolve();
        ready.then(() => {
          // Extra safety delay so the report content has fully laid out
          setTimeout(() => { window.print(); }, 800);
        });
      }, []);

      return (
        <window.SupervisorDashboard
          onLogout={() => {}}
          onOpenTeam={() => {}} />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

    // After mount, switch the dashboard's tab to 'report' by clicking the
    // matching tab button (state lives inside the component).
    const tryActivateReport = () => {
      const buttons = document.querySelectorAll('button');
      for (const b of buttons) {
        if (b.textContent && b.textContent.trim().toLowerCase().includes('evaluation report')) {
          b.click();
          return true;
        }
      }
      return false;
    };
    const interval = setInterval(() => {
      if (tryActivateReport()) clearInterval(interval);
    }, 100);
    setTimeout(() => clearInterval(interval), 5000);
  </script>
</body>
</html>
